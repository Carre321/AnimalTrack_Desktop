status = warn
name = AnimalTrackDesktopConfig

# Appenders
appenders = console, file

# ========================
# Console Appender
# ========================
appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger:%line - %msg%n

# ========================
# Rolling File Appender
# ========================
appender.file.type = RollingFile
appender.file.name = FileAppender

# Archivo activo (siempre el mismo mientras corre la app)
appender.file.fileName = logs/animaltrack-desktop.log

# Archivos generados con fecha y hora
appender.file.filePattern = logs/animaltrack-desktop-%d{yyyy-MM-dd-HH-mm}.log

appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger:%line - %msg%n

# Política de rotación por tiempo
appender.file.policies.type = Policies
appender.file.policies.time.type = TimeBasedTriggeringPolicy
appender.file.policies.time.interval = 1
appender.file.policies.time.modulate = true

# ========================
# Root Logger
# ========================
rootLogger.level = debug
rootLogger.appenderRefs = console, file
rootLogger.appenderRef.console.ref = ConsoleAppender
rootLogger.appenderRef.file.ref = FileAppender
